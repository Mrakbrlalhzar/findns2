name: Build findns for Termux (ARMv7 - Go 1.21+)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (1.21 or later)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build for linux/arm (ARMv7)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CGO_ENABLED: 0
        run: |
          cd cmd/findns
          go build -ldflags "-s -w" -o findns-armv7 .
          mkdir -p ${{ github.workspace }}/output
          cp findns-armv7 ${{ github.workspace }}/output/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: output/findns-armv7
