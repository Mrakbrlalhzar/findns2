name: Build findns for Termux (ARMv7)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'  # Use a recent Go version

      # این اکشن به طور خودکار NDK را دانلود و مسیر آن را تنظیم می‌کند.
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d  # Use a version where the script is present
          add-to-path: false

      - name: Build for Android ARMv7 with CGO
        env:
          GOOS: android
          GOARCH: arm
          GOARM: 7
          CGO_ENABLED: 1
          ANDROID_API: 21
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # مسیر کامپایلر Clang را بر اساس NDK تنظیم می‌کنیم
          TOOLCHAIN_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC="$TOOLCHAIN_BIN/armv7a-linux-androideabi${ANDROID_API}-clang"
          
          echo "Using compiler: $CC"
          
          # کامپایل پروژه
          cd cmd
          go build -ldflags "-s -w" -o findns-armv7 .
          mkdir -p ${{ github.workspace }}/output
          cp findns-armv7 ${{ github.workspace }}/output/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: output/findns-armv7
